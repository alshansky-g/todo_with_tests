name: CI

on: [push]

jobs:
  test-python:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - uses: browser-actions/setup-firefox@v1

      - name: Install dependencies
        run: pip install --group dev .

      - name: Run unit tests
        run: python src/manage.py test lists accounts

      - name: Run all tests
        run: cd src && python manage.py test

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screendumps
          path: src/functional_tests/screendumps/

  test-js:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - uses: browser-actions/setup-firefox@v1

      - name: Install JS dependencies
        run: cd src/lists/static && npm install

      - name: Run JS tests
        run: cd src/lists/static && npx jasmine-browser-runner runSpecs --config=tests/jasmine-browser-runner.config.mjs
